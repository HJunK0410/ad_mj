# 데이터 샘플링 설정 파일
# 이 파일을 사용하여 데이터 일부만 사용할 때 재현성을 확보합니다.
# 
# 사용법:
#   1. 이 파일을 수정하여 원하는 설정을 지정
#   2. train_with_continuity2.sh 실행 시 자동으로 이 파일을 읽어서 적용
#   3. 처음 실행 시 데이터 파일명이 subset_save_path에 저장됨 (인덱스가 아닌 실제 파일명)
#   4. 다음 실행 시 저장된 파일명을 자동으로 사용하여 동일한 데이터로 학습
#   5. 데이터셋이 변경되어도 동일한 파일명으로 재현 가능

# 데이터 샘플링 방법 (우선순위: data_subset_file > max_samples > data_ratio)
# 
# 방법 1: data_subset_file 사용 (가장 재현성이 높음)
#   - 이미 생성된 JSON 파일의 파일명을 사용 (인덱스가 아닌 실제 파일명)
#   - 동일한 데이터를 정확히 재현 가능
#   - 데이터셋이 변경되어도 동일한 파일명으로 재현 가능
#   - 예: "./data_subset_indices.json" 또는 "./outputs/subset_100.json"
data_subset_file: ""  # 비어있으면 아래 방법 사용

# 방법 2: max_samples 사용 (정확한 개수 지정)
#   - 정확히 지정한 개수만 사용
#   - data_subset_file이 비어있을 때만 사용됨
#   - 예: 100 (정확히 100개만 사용)
max_samples: null  # null이면 아래 방법 사용, 숫자 지정 시 해당 개수만 사용

# 방법 3: data_ratio 사용 (비율로 지정)
#   - 전체 데이터의 일정 비율만 사용
#   - data_subset_file과 max_samples가 모두 비어있을 때만 사용됨
#   - 예: 0.5 = 50%, 0.1 = 10%, 1.0 = 전체 사용
data_ratio: 1.0  # 0.0 ~ 1.0

# 재현성을 위한 시드 값
#   - 동일한 시드로 동일한 샘플링 결과를 얻을 수 있음
#   - 시드를 변경하면 다른 샘플이 선택됨
seed: 42

# 데이터 서브셋 파일명 저장 경로 (자동 생성 시)
#   - data_subset_file이 비어있고 max_samples 또는 data_ratio를 사용할 때
#   - 이 경로에 데이터 파일명이 저장되어 다음 실행 시 재현 가능
#   - 인덱스가 아닌 실제 파일명을 저장하므로 데이터셋이 변경되어도 재현 가능
#   - 저장된 파일이 있으면 자동으로 사용됨
subset_save_path: "./data_subset_indices.json"

# 메타 정보 (선택사항)
description: "데이터 샘플링 설정 - 재현성을 위한 설정 파일"
created_date: "2024-01-01"

# 사용 예시:
# 
# 예시 1: 정확히 100개만 사용하고 재현성 확보
#   max_samples: 100
#   subset_save_path: "./data_subset_100.json"
#   → 첫 실행 시 100개 샘플 선택 후 파일명 저장, 다음 실행 시 동일한 100개 파일 사용
#
# 예시 2: 50%만 사용하고 재현성 확보
#   data_ratio: 0.5
#   subset_save_path: "./data_subset_50pct.json"
#   → 첫 실행 시 50% 샘플 선택 후 파일명 저장, 다음 실행 시 동일한 파일명 사용
#
# 예시 3: 이미 생성된 서브셋 파일 사용
#   data_subset_file: "./data_subset_100.json"
#   → 저장된 파일명을 사용하여 정확히 동일한 데이터로 학습
#   → 데이터셋이 변경되어도 동일한 파일명으로 재현 가능

